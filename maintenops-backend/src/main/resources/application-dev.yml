server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/maintenops_db
    username: postgres
    password: ${JDBC_PASSWORD} # Set Environment Variable for JDBC_PASSWORD

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

    show_sql: true


logging:
  level:
    org.springframework.security: DEBUG

security:
  jwt:
    secret: ${JWT_SECRET:lMNrLnNIOyIsCce6oR7yJ8LxcvQfJshG+M930Y6bkEt1Lvl7Yd6CgvdQLP2YH3JAsdApPXzhXPkBcponJwip1g==}
    issuer: ${JWT_ISSUER:com.maintenops.nvcc}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:86400}
    refresh-token-cookie-name: ${JWT_REFRESH_TOKEN_NAME:refreshToken}
    cookie-secure: ${JWT_COOKIE_SECURE:true} # make it false for testing on network IP; true for cloudflared and localhost
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:lax}


app:
  cors:
    front-end-url: http://localhost:5173,${FRONTEND_URL} # Set Environment Variable for FRONTEND_URL 